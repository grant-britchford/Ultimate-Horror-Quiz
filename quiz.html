<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The Ultimate Horror Quiz. fun online quiz with questions from horror movies and real life crimes"
    />
    <meta name="keywords" content="Horror Quiz, movie, macabre, online quiz" />
    <!--website title-->
    <title>the Ultimate Horror Quiz</title>
    <!--favicon-->
    <link
      rel="icon"
      type="image/png"
      href="assets/images/icons8-horror-64.png"
    />
    <!--stylesheet-->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- title -->
    <header>
      <a href="index.html"></a>
      <h1>The Ultimate Horror Quiz</h1>
    </header>
    <main>
      <div id="hero">
        <div class="container">
          <div id="game">
            <div id="hud">
              <div id="hud-item">
                <div id="hud-item"><p class="hud-prefix">Score</p>
                <h2 class="hud-prefix" id="score">0</h2>
            </div>
            <br>
              <p class="hud-prefix">Question</p>
              <h2 class="hud-main-text" id="questionCounter"></h2>
            </div>
            <br>
            <div class="choice-container">
              <p class="choice-prefix">A</p>
            </div>
            <br>
            <div class="choice-container">
              <p class="choice-prefix">B</p>
            </div>
            <br>
            <div class="choice-container">
              <p class="choice-prefix">C</p>
            </div>
        </div>
        <br>
        <a id="play"  class="btn" href="quiz.html">Play Again</a>
        <br>
        <a id="home"  class="btn" href="index.html">Home</a>
      </div>
    </main>
    <!--javascript-->
    <script src="assets/js/quiz.js"></script>
    <script src="assets/js/scores.js"></script>
    <!-- footer-->
    <footer>
      <p>Copyright @ G.Britchford-pp2: 2023</p>
    </footer>
  </body>
</html>
