<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="The Ultimate Horror Quiz. fun online quiz with questions from horror movies and real life crimes"
    />
    <meta name="keywords" content="Horror Quiz, movie, macabre, online quiz" />
    <!--website title-->
    <title>the Ultimate Horror Quiz</title>
    <!--favicon-->
    <link
      rel="icon"
      type="image/png"
      href="assets/images/icons8-horror-64.png"
    />
    <!--stylesheet-->
    <link rel="stylesheet" href="assets/css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- title -->
    <header>
      <a href="index.html"></a>
      <h1>The Ultimate Horror Quiz</h1>
    </header>

    <div class="container">
      <div id="game" class="justify-center flex-column">
        <div id="hud">
          <div id="hud-item">
            <p id="progressText" class="hud-prefix">Question</p>
            <div id="progressBar">
              <div id="progressBarFull"></div>
            </div>
          </div>
          <div id="hud-item">
            <p class="hud-prefix">Score</p>
            <h1 class="hud-main-text" id="score">0</h1>
          </div>
        </div>
        <h2 id="question">What is the answer to these questions?</h2>
        <div class="choice-container">
          <p class="choice-prefix">A</p>
          <p class="choice-text" data-number="1">A:</p>
        </div>
        <div class="choice-container">
          <p class="choice-prefix">B</p>
          <p class="choice-text" data-number="2">B:</p>
        </div>
        <div class="choice-container">
          <p class="choice-prefix">C</p>
          <p class="choice-text" data-number="3">C:</p>
        </div>
      </div>
    </div>
    <!--javascript-->
    <script src="assets/js/quiz.js"></script>

    <footer>
      <p>Copyright@ G.Britchford-pp2:2023</p>
    </footer>
  </body>
</html>
