<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="The Ultimate Horror Quiz. fun online quiz with questions from horror movies and real life crimes">
    <meta name="keywords" content="Horror Quiz, movie, macabre, online quiz">
    <!--website title-->
    <title>the Ultimate Horror Quiz</title>
    <!--favicon-->
    <link rel="icon"
      type="image/png"
      href="assets/images/icons8-horror-64.png">
    <!--stylesheet-->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap"
      rel="stylesheet">
      </head>
  <body>
    <!-- title -->
    <header>
        <a href="index.html"></a>
      <h1>The Ultimate Horror Quiz</h1>
    </header>
    <!-- main body -->
    <main>
      <h2 id="end">Congratulations</h2>
        <div id="hero"></div>
      <h2 id="score-table">High Scores table</h2>
      </div>
      <div id="highScore">
        <thead>
          <th>Position</th>
          <th>Name</th>
          <th>Score</th>
        </thead>
        <form>
          <input
          type="text"
          name="username"
          id="username"
          placeholder="username"
          />
          <button
          type="submit"
          class="btn"
          id="saveScoreBtn"
          onclick="saveHighScore(event)"
          >Save</button>
        </form>

        <a class="btn" href="quiz.html">Play Again</a>
        <a class="btn" href="index.html">Home</a>
      </div>
    </main>
    <!--javascript-->
    <script src="assets/js/scores.js"></script>

    <footer>
      <p>Copyright @ G.Britchford-pp2: 2023</p>
    </footer>
  </body>
